<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - knifeblackstore</title>
    <link rel="stylesheet" href="/main.css?v=2">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-container {
            max-width: 450px;
            margin: 80px auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        .login-container h2 {
            margin-bottom: 30px;
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 1rem;
            color: #fff;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .login-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            background: rgba(255,255,255,0.1);
        }
        .login-btn {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 900;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
        }
        .login-container p {
            color: #888;
        }
        .login-container a {
            font-weight: bold;
            transition: 0.3s;
        }
        .login-container a:hover {
            color: var(--neon-cyan) !important;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
</head>
<body class="gamer-body">
    <nav class="nav">
        <a href="index.html" class="logo" style="display:flex; align-items:center; gap:10px;">
            <img src="logo.png" alt="Logo Knifeblack Store" style="height:40px;">
            knifeblackstore
        </a>
        <div style="display:flex; align-items:center; gap:15px; margin-left:auto;">
            <a href="login.html" style="background:#e74c3c; color:white; padding:8px 15px; border-radius:5px; text-decoration:none; font-weight:bold; font-size:0.9rem; transition:0.3s; margin:0;">Iniciar Sesión</a>
            <button class="menu-toggle" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="links menu">
            <div class="dropdown">
                <a href="index.html#servicios">Servicios ▾</a>
                <div class="dropdown-content">
                    <a href="productos.html">Productos y Accesorios</a>
                    <a href="plataformas.html">Plataformas Streaming</a>
                    <a href="nosotros.html">¿Quién es Knifeblackstore?</a>
                </div>
            </div>
            <a href="contacto.html">Contacto</a>
        </div>
    </nav>

    <div class="login-container" id="form-login">
        <h2>Bienvenido de Nuevo</h2>
        <form id="loginForm">
            <input type="text" id="loginEmail" class="login-input" placeholder="Usuario o Email" required>
            <input type="password" id="loginPassword" class="login-input" placeholder="Contraseña" required>
            <button type="submit" class="login-btn">Iniciar Sesión</button>
            <p style="margin-top: 15px; color:#666;">¿No tienes cuenta? <a href="#" onclick="toggleForms()" style="color:#3498db;">Regístrate</a></p>
        </form>
    </div>

    <div class="login-container" id="form-register" style="display: none;">
        <h2 id="register-title">Crear Cuenta</h2>
        <form id="registerForm">
            <input type="text" id="regName" class="login-input" placeholder="Nombre Completo / Usuario" required>
            <input type="email" id="regEmail" class="login-input" placeholder="Correo Electrónico" required>
            <input type="password" id="regPassword" class="login-input" placeholder="Contraseña" required>
            <select id="regRole" class="login-input" style="display: none; background: #222; color: #00f0ff; border: 1px solid var(--neon-cyan);">
                <option value="user">Rango: Usuario Estándar</option>
                <option value="admin">Rango: Administrador</option>
            </select>
            <button type="submit" class="login-btn" style="background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));">Confirmar Creación</button>
            <p style="margin-top: 15px; color:#666;" id="login-redirect-text">¿Ya tienes cuenta? <a href="#" onclick="toggleForms()" style="color:#3498db;">Inicia Sesión</a></p>
        </form>
    </div>

    <script>
        function toggleForms() {
            const login = document.getElementById('form-login');
            const register = document.getElementById('form-register');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }
    </script>

    <script src="script.js?v=5"></script>
</body>
</html>
